<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>BEAR RADAR — 滋賀クマ出没情報</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&family=Noto+Sans+JP:wght@300;400;700&display=swap');

:root{
  --g:#00ff41;--gdim:#00aa2a;--gglow:rgba(0,255,65,.6);
  --amb:#ffb800;--red:#ff3030;--th:58px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:#000;font-family:'Share Tech Mono',monospace;color:var(--g);overflow:hidden;}
#app{display:flex;flex-direction:column;height:100%;max-width:480px;margin:0 auto;}

/* ── HEADER ── */
.hdr{flex-shrink:0;display:flex;align-items:center;justify-content:space-between;padding:11px 16px 7px;border-bottom:1px solid rgba(0,255,65,.14);background:rgba(0,0,0,.97);z-index:100;}
.hdr h1{font-family:'Orbitron',sans-serif;font-size:12px;font-weight:900;letter-spacing:4px;text-shadow:0 0 12px var(--gglow);}
.abadge{font-size:9px;letter-spacing:2px;color:var(--red);animation:blink .8s step-end infinite;text-shadow:0 0 8px rgba(255,48,48,.8);}
@keyframes blink{50%{opacity:0}}

/* ── PAGES ── */
.pages{flex:1;overflow:hidden;position:relative;}
.page{position:absolute;inset:0;overflow-y:auto;overflow-x:hidden;opacity:0;pointer-events:none;transition:opacity .2s;}
.page.active{opacity:1;pointer-events:all;}

/* ── TAB BAR ── */
.tabbar{flex-shrink:0;height:var(--th);display:flex;background:#030a03;border-top:1px solid rgba(0,255,65,.2);box-shadow:0 -4px 20px rgba(0,255,65,.08);z-index:200;}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;cursor:pointer;position:relative;user-select:none;transition:background .2s;}
.tab:active{background:rgba(0,255,65,.06);}
.tab.on{background:rgba(0,255,65,.05);}
.ti{font-size:18px;filter:grayscale(1) brightness(.35);transition:filter .2s;}
.tab.on .ti{filter:none;}
.tl{font-family:'Orbitron',sans-serif;font-size:7px;letter-spacing:2px;color:rgba(0,255,65,.3);transition:color .2s;}
.tab.on .tl{color:var(--g);text-shadow:0 0 8px var(--gglow);}
.tline{position:absolute;top:0;left:50%;transform:translateX(-50%);width:0;height:2px;background:var(--g);box-shadow:0 0 8px var(--gglow);transition:width .3s;}
.tab.on .tline{width:40px;}
.tbadge{position:absolute;top:6px;right:calc(50% - 20px);background:var(--red);color:#fff;font-size:8px;font-family:'Orbitron',sans-serif;width:14px;height:14px;border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:0 0 6px rgba(255,48,48,.6);}

/* ══════════ PAGE: RADAR ══════════ */
#pRadar{display:flex;flex-direction:column;align-items:center;padding:12px 14px 14px;gap:10px;}

/* GPS toggle button */
.gps-btn{
  width:100%;max-width:360px;
  display:flex;align-items:center;justify-content:space-between;
  background:rgba(0,255,65,.04);border:1px solid rgba(0,255,65,.25);
  border-radius:8px;padding:8px 14px;cursor:pointer;
  transition:background .2s;
}
.gps-btn:hover{background:rgba(0,255,65,.08);}
.gps-btn.active{border-color:var(--g);background:rgba(0,255,65,.08);}
.gps-btn-left{display:flex;align-items:center;gap:8px;font-size:9px;letter-spacing:2px;}
.gps-icon{font-size:14px;}
.gps-status{font-size:8px;color:var(--gdim);letter-spacing:1px;}
.gps-status.on{color:var(--g);text-shadow:0 0 6px var(--gglow);}
.gps-status.err{color:var(--red);}
/* toggle switch */
.toggle{width:36px;height:18px;background:rgba(0,255,65,.15);border:1px solid rgba(0,255,65,.3);border-radius:9px;position:relative;transition:background .2s;}
.toggle.on{background:rgba(0,255,65,.35);border-color:var(--g);}
.toggle::after{content:'';position:absolute;top:2px;left:2px;width:12px;height:12px;background:#000;border-radius:50%;border:2px solid var(--gdim);transition:transform .2s,border-color .2s;}
.toggle.on::after{transform:translateX(18px);border-color:var(--g);background:var(--g);}

.device{width:100%;max-width:360px;background:linear-gradient(160deg,#1e2e1e 0%,#0d1a0e 40%,#060f07 100%);border-radius:24px 24px 55% 55%/24px 24px 36px 36px;padding:16px 16px 28px;box-shadow:0 0 0 2px #2a3d2a,0 0 0 4px #111c11,0 0 40px rgba(0,255,65,.15),inset 0 2px 0 rgba(255,255,255,.05),inset 0 -4px 20px rgba(0,0,0,.8);}
.sframe{background:#000;border-radius:50%;padding:5px;box-shadow:0 0 0 3px #0d1a0e,0 0 0 5px #1e2e1e,0 0 25px rgba(0,255,65,.2);aspect-ratio:1;width:100%;}
.screen{width:100%;height:100%;border-radius:50%;background:radial-gradient(ellipse at 40% 35%,#012006 0%,#010802 55%,#000 100%);position:relative;overflow:hidden;cursor:crosshair;}
.screen::after{content:'';position:absolute;inset:0;background:repeating-linear-gradient(to bottom,transparent 0,transparent 2px,rgba(0,0,0,.15) 2px,rgba(0,0,0,.15) 4px);border-radius:50%;pointer-events:none;z-index:50;}
.screen::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at center,transparent 55%,rgba(0,0,0,.85) 100%);border-radius:50%;pointer-events:none;z-index:51;}
#rc{position:absolute;inset:0;width:100%;height:100%;border-radius:50%;z-index:1;}

/* blips */
.blip{position:absolute;transform:translate(-50%,-50%);z-index:20;pointer-events:none;}
.bd{width:10px;height:10px;border-radius:50%;background:var(--red);box-shadow:0 0 6px var(--red),0 0 14px rgba(255,48,48,.6);animation:bp 1.4s ease-in-out infinite;position:relative;z-index:2;}
.br{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:10px;height:10px;border-radius:50%;border:2px solid var(--red);animation:brng 1.4s ease-out infinite;}
.br2{animation-delay:.5s;}
@keyframes bp{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.7;transform:scale(1.2)}}
@keyframes brng{0%{width:10px;height:10px;opacity:.9;border-color:var(--red)}100%{width:40px;height:40px;opacity:0;border-color:var(--amb)}}

/* self position blip — blue/cyan */
.blip-self .bd{background:#00e5ff;box-shadow:0 0 8px #00e5ff,0 0 18px rgba(0,229,255,.5);width:12px;height:12px;animation:bp-self 1.8s ease-in-out infinite;}
.blip-self .br{border-color:#00e5ff;animation:brng-self 2s ease-out infinite;}
.blip-self .br2{animation-delay:.7s;border-color:#00e5ff;}
@keyframes bp-self{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.85;transform:scale(1.1)}}
@keyframes brng-self{0%{width:12px;height:12px;opacity:.9;border-color:#00e5ff}100%{width:44px;height:44px;opacity:0;border-color:rgba(0,229,255,.2)}}

/* accuracy circle */
.acc-circle{
  position:absolute;transform:translate(-50%,-50%);
  border-radius:50%;
  border:1px dashed rgba(0,229,255,.35);
  background:rgba(0,229,255,.04);
  pointer-events:none;z-index:18;
}

.ccross{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:10;pointer-events:none;}
.ccross::before,.ccross::after{content:'';position:absolute;background:rgba(0,255,65,.4);}
.ccross::before{width:1px;height:20px;left:0;top:-10px;}
.ccross::after{width:20px;height:1px;left:-10px;top:0;}
.swpc{position:absolute;inset:0;border-radius:50%;z-index:5;overflow:hidden;pointer-events:none;}
.swp{position:absolute;top:50%;left:50%;width:50%;height:2px;transform-origin:left center;animation:swp 3s linear infinite;background:linear-gradient(to right,transparent,rgba(0,255,65,.03),var(--g));box-shadow:0 0 4px var(--gglow);}
.swpf{position:absolute;inset:0;border-radius:50%;background:conic-gradient(from 0deg,transparent 0%,transparent 60%,rgba(0,255,65,.04) 80%,rgba(0,255,65,.1) 100%);animation:swpc 3s linear infinite;pointer-events:none;}
@keyframes swp{from{transform:rotate(0)}to{transform:rotate(360deg)}}
@keyframes swpc{from{transform:rotate(0)}to{transform:rotate(360deg)}}

.bpanel{display:flex;gap:8px;width:100%;max-width:360px;}
.dr{flex:1;background:rgba(0,255,65,.04);border:1px solid rgba(0,255,65,.2);border-radius:6px;padding:7px 8px;}
.dr .dl{color:var(--gdim);font-size:7px;letter-spacing:2px;text-transform:uppercase;margin-bottom:3px;}
.dr .dv{color:var(--g);text-shadow:0 0 6px var(--gglow);font-size:10px;}
.dr .dv.al{color:var(--red);text-shadow:0 0 8px rgba(255,48,48,.6);animation:blink 1.2s step-end infinite;}
.dr .dv.cyan{color:#00e5ff;text-shadow:0 0 8px rgba(0,229,255,.5);}

.sbar{display:flex;justify-content:space-between;align-items:center;font-size:8px;color:rgba(0,255,65,.35);letter-spacing:2px;padding:0 4px;width:100%;max-width:360px;}
.sdot{width:5px;height:5px;border-radius:50%;background:var(--g);box-shadow:0 0 6px var(--gglow);display:inline-block;margin-right:5px;animation:sp 2s ease-in-out infinite;}
@keyframes sp{0%,100%{opacity:1}50%{opacity:.3}}

/* ══════════ PAGE: MAP ══════════ */
#pMap{position:relative;height:100%;overflow:hidden;}
#leafMap{position:absolute;inset:0;filter:saturate(0) brightness(.48) contrast(1.5) sepia(.6) hue-rotate(88deg) brightness(1.18);}
.mscan{position:absolute;inset:0;pointer-events:none;z-index:410;background:repeating-linear-gradient(to bottom,transparent 0,transparent 3px,rgba(0,255,65,.035) 3px,rgba(0,255,65,.035) 4px);}
.mtint{position:absolute;inset:0;background:rgba(0,50,5,.12);mix-blend-mode:screen;pointer-events:none;z-index:411;}
.mvig{position:absolute;inset:0;background:radial-gradient(ellipse at center,transparent 35%,rgba(0,6,1,.7) 100%);pointer-events:none;z-index:412;}

.mhud-tl{position:absolute;top:10px;left:10px;z-index:500;font-family:'Orbitron',sans-serif;font-size:8px;letter-spacing:2px;color:rgba(0,255,65,.7);text-shadow:0 0 6px var(--gglow);background:rgba(0,0,0,.78);padding:6px 10px;border:1px solid rgba(0,255,65,.25);border-radius:3px;pointer-events:none;line-height:1.9;}
.mhud-tr{position:absolute;top:10px;right:10px;z-index:500;pointer-events:none;}
.mscale{display:flex;align-items:center;gap:5px;background:rgba(0,0,0,.78);padding:5px 9px;border:1px solid rgba(0,255,65,.25);border-radius:3px;}
.mscalebar{width:40px;height:2px;background:var(--g);box-shadow:0 0 4px var(--gglow);}
.mscalelbl{font-size:8px;color:var(--gdim);letter-spacing:1px;}

/* Bear markers */
.bear-marker{width:18px;height:18px;background:var(--red);border-radius:50%;border:2px solid rgba(255,255,255,.2);box-shadow:0 0 10px var(--red),0 0 20px rgba(255,48,48,.4);animation:bp 1.4s ease-in-out infinite;position:relative;cursor:pointer;}
.bear-marker.old{background:rgba(0,255,65,.55);box-shadow:0 0 10px rgba(0,255,65,.45);}
.bear-marker::after{content:'';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:18px;height:18px;border-radius:50%;border:2px solid var(--red);animation:brng 1.6s ease-out infinite;}
.bear-marker.old::after{border-color:rgba(0,255,65,.5);}

/* Self marker on map */
.self-map-marker{width:16px;height:16px;background:#00e5ff;border-radius:50%;border:2px solid rgba(255,255,255,.4);box-shadow:0 0 10px #00e5ff,0 0 22px rgba(0,229,255,.4);animation:bp-self 1.8s ease-in-out infinite;position:relative;}
.self-map-marker::after{content:'';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:16px;height:16px;border-radius:50%;border:2px solid #00e5ff;animation:brng-self 2s ease-out infinite;}

/* Leaflet popup */
.leaflet-popup-content-wrapper{background:rgba(0,8,2,.96)!important;border:1px solid rgba(0,255,65,.35)!important;border-left:3px solid var(--red)!important;border-radius:0 6px 6px 0!important;box-shadow:0 0 20px rgba(0,255,65,.15)!important;color:var(--g)!important;font-family:'Share Tech Mono',monospace!important;}
.leaflet-popup-tip{background:rgba(0,8,2,.96)!important;}
.leaflet-popup-close-button{color:rgba(0,255,65,.5)!important;font-size:16px!important;}
.leaflet-popup-close-button:hover{color:var(--g)!important;}
.pi .pt{font-size:9px;color:var(--amb);margin-bottom:4px;}
.pi .pl{font-family:'Noto Sans JP',sans-serif;font-size:13px;font-weight:700;color:var(--g);text-shadow:0 0 8px var(--gglow);margin-bottom:4px;}
.pi .pd{font-family:'Noto Sans JP',sans-serif;font-size:10px;font-weight:300;color:rgba(0,255,65,.65);line-height:1.55;}
.pi .pc{display:inline-block;margin-top:5px;font-size:9px;background:rgba(255,48,48,.15);border:1px solid var(--red);border-radius:3px;color:var(--red);padding:2px 7px;}
.leaflet-control-attribution{background:rgba(0,0,0,.75)!important;color:rgba(0,255,65,.3)!important;}
.leaflet-control-attribution a{color:rgba(0,255,65,.4)!important;}
.leaflet-control-zoom a{background:rgba(0,10,2,.9)!important;color:var(--g)!important;border-color:rgba(0,255,65,.3)!important;}
.leaflet-control-zoom a:hover{background:rgba(0,255,65,.1)!important;}

/* ══════════ PAGE: LOG ══════════ */
#pLog{padding:14px 14px 20px;}
.lhdr{font-family:'Orbitron',sans-serif;font-size:9px;letter-spacing:3px;color:var(--gdim);margin-bottom:10px;display:flex;align-items:center;gap:8px;}
.lhdr::after{content:'';flex:1;height:1px;background:linear-gradient(to right,var(--gdim),transparent);}
.lstats{display:flex;gap:8px;margin-bottom:14px;}
.sc{flex:1;background:rgba(0,255,65,.04);border:1px solid rgba(0,255,65,.2);border-radius:6px;padding:9px 8px;text-align:center;}
.sc .sl{font-size:7px;color:var(--gdim);letter-spacing:2px;margin-bottom:4px;text-transform:uppercase;}
.sc .sv{font-size:15px;color:var(--g);text-shadow:0 0 10px var(--gglow);font-family:'Orbitron',sans-serif;}
.sc .sv.r{color:var(--red);text-shadow:0 0 10px rgba(255,48,48,.6);}

.le{background:rgba(0,255,65,.03);border:1px solid rgba(0,255,65,.12);border-left:3px solid var(--red);border-radius:0 4px 4px 0;padding:10px 12px;display:flex;gap:10px;align-items:flex-start;margin-bottom:7px;cursor:pointer;transition:background .15s,border-left-color .15s;}
.le:hover{background:rgba(0,255,65,.07);border-left-color:var(--amb);}
.le.fresh{border-left-color:var(--amb);background:rgba(255,184,0,.04);}
.le.old{border-left-color:var(--gdim);opacity:.65;}
.le .map-hint{font-size:8px;color:var(--gdim);letter-spacing:1px;margin-top:4px;}
.le:hover .map-hint{color:var(--amb);}
.lt{font-size:9px;color:var(--amb);white-space:nowrap;text-shadow:0 0 6px rgba(255,184,0,.4);}
.lb{flex:1;}
.lloc{font-family:'Noto Sans JP',sans-serif;font-size:12px;font-weight:700;color:var(--g);text-shadow:0 0 8px var(--gglow);margin-bottom:3px;}
.ldet{font-family:'Noto Sans JP',sans-serif;font-size:10px;font-weight:300;color:rgba(0,255,65,.6);line-height:1.5;}
.lcnt{font-size:9px;background:rgba(255,48,48,.15);border:1px solid var(--red);border-radius:3px;color:var(--red);padding:2px 6px;white-space:nowrap;align-self:center;}
</style>
</head>
<body>
<div id="app">

  <div class="hdr">
    <h1>🐻 BEAR RADAR</h1>
    <span class="abadge">⚠ ALERT ACTIVE</span>
  </div>

  <div class="pages">

    <!-- ══ RADAR ══ -->
    <div id="pRadar" class="page active">

      <!-- GPS toggle -->
      <div class="gps-btn" id="gpsBtn">
        <div class="gps-btn-left">
          <span class="gps-icon">📍</span>
          <div>
            <div style="font-size:9px;letter-spacing:2px;">現在地を表示</div>
            <div class="gps-status" id="gpsStatus">OFF</div>
          </div>
        </div>
        <div class="toggle" id="gpsToggle"></div>
      </div>

      <div class="device">
        <div class="sframe">
          <div class="screen">
            <canvas id="rc"></canvas>
            <div class="swpc"><div class="swpf"></div><div class="swp"></div></div>
            <div class="ccross"></div>
            <div id="blips"></div>
          </div>
        </div>
        <div class="bpanel" style="margin-top:12px;">
          <div class="dr"><div class="dl">検知 TODAY</div><div class="dv al" id="tc">0</div></div>
          <div class="dr"><div class="dl">最新検知</div><div class="dv" id="ltime">--:--</div></div>
          <div class="dr"><div class="dl">自分の位置</div><div class="dv cyan" id="selfPos">--</div></div>
        </div>
      </div>
      <div class="sbar"><span><span class="sdot"></span>SCANNING SHIGA PREF.</span><span id="clk">--:--:--</span></div>
    </div>

    <!-- ══ MAP ══ -->
    <div id="pMap" class="page">
      <div id="leafMap"></div>
      <div class="mscan"></div><div class="mtint"></div><div class="mvig"></div>
      <div class="mhud-tl" id="mapHud">SHIGA PREF.<br>N 35°21' E 136°06'<br>BEAR ZONE ACTIVE</div>
      <div class="mhud-tr"><div class="mscale"><div class="mscalebar"></div><span class="mscalelbl">10KM</span></div></div>
    </div>

    <!-- ══ LOG ══ -->
    <div id="pLog" class="page">
      <div class="lhdr">INCIDENT LOG</div>
      <div class="lstats">
        <div class="sc"><div class="sl">本日検知</div><div class="sv r" id="stToday">0</div></div>
        <div class="sc"><div class="sl">今月累計</div><div class="sv" id="stMonth">0</div></div>
        <div class="sc"><div class="sl">頭数合計</div><div class="sv r" id="stBears">0</div></div>
      </div>
      <div id="logEl"></div>
    </div>

  </div>

  <div class="tabbar">
    <div class="tab on"  data-page="pRadar"><div class="tline"></div><span class="ti">📡</span><span class="tl">RADAR</span></div>
    <div class="tab"     data-page="pMap">  <div class="tline"></div><span class="ti">🗺</span><span class="tl">MAP</span><div class="tbadge" id="mbadge">6</div></div>
    <div class="tab"     data-page="pLog">  <div class="tline"></div><span class="ti">📋</span><span class="tl">LOG</span></div>
  </div>

</div>

<script>
/* ═══════════════════════════════════════
   DATA — 正確な座標（琵琶湖の外）
═══════════════════════════════════════ */
const INC = [
  // 大津市仰木 — 琵琶湖西岸 比叡山系山麓
  {id:1, time:"07:23",      lat:35.1285, lng:135.8730, location:"大津市仰木",     detail:"体長約1.2m 単独行動 民家裏山",       count:1, age:"fresh"},
  // 彦根市鳥居本 — 琵琶湖東岸 山際
  {id:2, time:"06:47",      lat:35.2758, lng:136.2618, location:"彦根市鳥居本町", detail:"農道付近 足跡確認 親子とみられる",   count:2, age:"fresh"},
  // 甲賀市信楽町 — 南部山地
  {id:3, time:"05:12",      lat:34.8890, lng:136.1780, location:"甲賀市信楽町",   detail:"茶畑に侵入 蜂の巣破壊の痕跡あり",  count:1, age:"recent"},
  // 湖南市夏見 — 南部
  {id:4, time:"昨日 22:04", lat:34.9580, lng:136.0710, location:"湖南市夏見",     detail:"住宅街から目撃情報 警戒中",         count:1, age:"old"},
  // 長浜市余呉町 — 北部余呉湖周辺
  {id:5, time:"昨日 18:30", lat:35.5100, lng:136.2280, location:"長浜市余呉町",   detail:"国道沿い横断 車から目撃",           count:1, age:"old"},
  // 東近江市政所 — 東部鈴鹿山系
  {id:6, time:"昨日 14:17", lat:35.1200, lng:136.3500, location:"東近江市政所",   detail:"廃屋付近に糞確認 生ごみ漁りの跡",  count:1, age:"old"},
];

/* ═══════════════════════════════════════
   STATE
═══════════════════════════════════════ */
let gpsOn       = false;
let gpsWatchId  = null;
let selfLatLng  = null; // {lat, lng, acc}
let leafMap     = null;
let mapInit     = false;
let selfMapMark = null;
let selfAccCirc = null;
let bearMarkers = {};   // id → L.marker

/* ═══════════════════════════════════════
   TABS
═══════════════════════════════════════ */
document.querySelectorAll('.tab').forEach(t=>{
  t.addEventListener('click',()=>{
    document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));
    document.querySelectorAll('.page').forEach(x=>x.classList.remove('active'));
    t.classList.add('on');
    const pid=t.dataset.page;
    document.getElementById(pid).classList.add('active');
    if(pid==='pMap'){
      if(!mapInit){initMap();mapInit=true;}
      else setTimeout(()=>leafMap.invalidateSize(),80);
    }
  });
});

/* ═══════════════════════════════════════
   GPS
═══════════════════════════════════════ */
document.getElementById('gpsBtn').addEventListener('click',()=>{
  gpsOn ? stopGPS() : startGPS();
});

function startGPS(){
  if(!('geolocation' in navigator)){
    setGpsStatus('非対応','err'); return;
  }
  setGpsStatus('取得中…','');
  document.getElementById('gpsToggle').classList.add('on');
  document.getElementById('gpsBtn').classList.add('active');
  gpsOn=true;

  gpsWatchId=navigator.geolocation.watchPosition(
    pos=>{
      selfLatLng={lat:pos.coords.latitude, lng:pos.coords.longitude, acc:pos.coords.accuracy};
      setGpsStatus('ON — 受信中','on');
      document.getElementById('selfPos').textContent='受信中';
      renderBlips();
      updateSelfOnMap();
    },
    err=>{
      const msg=err.code===1?'許可拒否':err.code===2?'取得失敗':'タイムアウト';
      setGpsStatus(msg,'err');
      document.getElementById('selfPos').textContent='--';
    },
    {enableHighAccuracy:true,maximumAge:5000,timeout:15000}
  );
}

function stopGPS(){
  if(gpsWatchId!==null){navigator.geolocation.clearWatch(gpsWatchId);gpsWatchId=null;}
  gpsOn=false; selfLatLng=null;
  document.getElementById('gpsToggle').classList.remove('on');
  document.getElementById('gpsBtn').classList.remove('active');
  setGpsStatus('OFF','');
  document.getElementById('selfPos').textContent='--';
  renderBlips();
  // remove self marker from map
  if(selfMapMark&&leafMap){leafMap.removeLayer(selfMapMark);selfMapMark=null;}
  if(selfAccCirc&&leafMap){leafMap.removeLayer(selfAccCirc);selfAccCirc=null;}
}

function setGpsStatus(txt,cls){
  const el=document.getElementById('gpsStatus');
  el.textContent=txt; el.className='gps-status'+(cls?' '+cls:'');
}

/* ═══════════════════════════════════════
   RADAR CANVAS
═══════════════════════════════════════ */
const canvas=document.getElementById('rc');
const ctx=canvas.getContext('2d');

// Radar center = 滋賀県中心付近
// Radius = 約20km → 1リング=5km
const RADAR_CENTER = {lat:35.22, lng:136.07};
const RADAR_KM_RADIUS = 20; // レーダー端 = 20km

function km2px(km){
  // レーダー半径(px) / RADAR_KM_RADIUS * km
  return (canvas.width/2 / RADAR_KM_RADIUS) * km;
}

function latLngToRadar(lat,lng){
  // Haversine-free projection（小範囲なのでflatで十分）
  const R=6371;
  const dlat=(lat-RADAR_CENTER.lat)*Math.PI/180;
  const dlng=(lng-RADAR_CENTER.lng)*Math.PI/180;
  const mlat=(RADAR_CENTER.lat)*Math.PI/180;
  const dy=dlat*R; // km 北+
  const dx=dlng*R*Math.cos(mlat); // km 東+
  const cx=canvas.width/2;
  // px座標: 画面上=北、右=東
  return {
    px: cx + dx * (cx/RADAR_KM_RADIUS),
    py: cx - dy * (cx/RADAR_KM_RADIUS),
  };
}

function resizeCanvas(){
  const s=canvas.parentElement.offsetWidth;
  canvas.width=s;canvas.height=s;
  drawGrid();renderBlips();
}

function drawGrid(){
  const W=canvas.width,cx=W/2,r=W/2;
  ctx.clearRect(0,0,W,W);
  // 同心円（5/10/15/20km）
  [.25,.5,.75,1].forEach((t,i)=>{
    ctx.beginPath();ctx.arc(cx,cx,r*t,0,Math.PI*2);
    ctx.strokeStyle=t===1?'rgba(0,255,65,.35)':'rgba(0,255,65,.18)';
    ctx.lineWidth=t===1?1.5:.7;ctx.stroke();
  });
  // 十字
  ctx.strokeStyle='rgba(0,255,65,.14)';ctx.lineWidth=.5;
  ctx.beginPath();ctx.moveTo(0,cx);ctx.lineTo(W,cx);ctx.stroke();
  ctx.beginPath();ctx.moveTo(cx,0);ctx.lineTo(cx,W);ctx.stroke();
  // 斜め
  [45,135].forEach(deg=>{
    const rad=deg*Math.PI/180;
    ctx.beginPath();ctx.moveTo(cx-Math.cos(rad)*r,cx-Math.sin(rad)*r);ctx.lineTo(cx+Math.cos(rad)*r,cx+Math.sin(rad)*r);
    ctx.strokeStyle='rgba(0,255,65,.07)';ctx.lineWidth=.5;ctx.stroke();
  });
  // 方位
  ctx.font='8px Share Tech Mono';ctx.fillStyle='rgba(0,255,65,.4)';ctx.textAlign='center';
  const dirs=[['N',0],['E',90],['S',180],['W',270]];
  dirs.forEach(([d,deg])=>{
    const rad=(deg-90)*Math.PI/180;
    ctx.fillText(d,cx+Math.cos(rad)*(r*.92),cx+Math.sin(rad)*(r*.92)+3);
  });
  // 距離ラベル
  ctx.fillStyle='rgba(0,255,65,.25)';ctx.font='7px Share Tech Mono';ctx.textAlign='left';
  ['5km','10km','15km'].forEach((l,i)=>ctx.fillText(l,cx+3,cx-r*(.25+i*.25)+3));
}

function renderBlips(){
  const c=document.getElementById('blips');c.innerHTML='';
  const size=canvas.width;

  // ── 熊ブリップ
  INC.forEach(inc=>{
    const {px,py}=latLngToRadar(inc.lat,inc.lng);
    // 円内チェック
    const cx=size/2,dx=px-cx,dy=py-cx,dist=Math.sqrt(dx*dx+dy*dy);
    let fpx=px,fpy=py;
    if(dist>cx*0.92){const s=cx*0.9/dist;fpx=cx+dx*s;fpy=cx+dy*s;}

    const b=document.createElement('div');b.className='blip';
    b.style.left=fpx+'px';b.style.top=fpy+'px';
    const dot=document.createElement('div');dot.className='bd';
    if(inc.age==='old'){dot.style.background='rgba(0,255,65,.5)';dot.style.boxShadow='0 0 6px rgba(0,255,65,.4)';}
    else if(inc.age==='fresh'){dot.style.width='12px';dot.style.height='12px';}
    const r1=document.createElement('div');r1.className='br';
    const r2=document.createElement('div');r2.className='br br2';
    b.appendChild(dot);b.appendChild(r1);b.appendChild(r2);
    c.appendChild(b);
  });

  // ── 自分のブリップ
  if(gpsOn && selfLatLng){
    const {px,py}=latLngToRadar(selfLatLng.lat,selfLatLng.lng);
    const cx=size/2,dx=px-cx,dy=py-cx,dist=Math.sqrt(dx*dx+dy*dy);
    const inRange=dist<cx*0.9;

    if(inRange){
      // 精度円
      const accKm=selfLatLng.acc/1000;
      const accPx=km2px(accKm)*2; // diameter
      if(accPx>8&&accPx<size){
        const accEl=document.createElement('div');
        accEl.className='acc-circle';
        accEl.style.left=px+'px';accEl.style.top=py+'px';
        accEl.style.width=accPx+'px';accEl.style.height=accPx+'px';
        c.appendChild(accEl);
      }

      const b=document.createElement('div');b.className='blip blip-self';
      b.style.left=px+'px';b.style.top=py+'px';
      const dot=document.createElement('div');dot.className='bd';
      const r1=document.createElement('div');r1.className='br';
      const r2=document.createElement('div');r2.className='br br2';
      b.appendChild(dot);b.appendChild(r1);b.appendChild(r2);
      c.appendChild(b);
    } else {
      // 範囲外 → 端に矢印表示
      const angle=Math.atan2(dy,dx);
      const ex=cx+Math.cos(angle)*cx*0.88;
      const ey=cx+Math.sin(angle)*cx*0.88;
      const arr=document.createElement('div');
      arr.className='blip blip-self';arr.style.left=ex+'px';arr.style.top=ey+'px';
      arr.innerHTML='<div class="bd" style="width:8px;height:8px;opacity:.5;"></div>';
      c.appendChild(arr);
    }
    document.getElementById('selfPos').textContent='取得済';
  }
}

/* ═══════════════════════════════════════
   LEAFLET MAP
═══════════════════════════════════════ */
function initMap(){
  leafMap=L.map('leafMap',{center:[35.22,136.07],zoom:10,zoomControl:true,attributionControl:true});
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
    attribution:'© OpenStreetMap contributors',maxZoom:18,
  }).addTo(leafMap);

  // 熊マーカー
  INC.forEach(inc=>{
    const icon=L.divIcon({
      className:'',
      html:`<div class="bear-marker${inc.age==='old'?' old':''}"></div>`,
      iconSize:[18,18],iconAnchor:[9,9],popupAnchor:[0,-12],
    });
    const m=L.marker([inc.lat,inc.lng],{icon}).addTo(leafMap);
    m.bindPopup(`<div class="pi"><div class="pt">⏱ ${inc.time}</div><div class="pl">📍 ${inc.location}</div><div class="pd">${inc.detail}</div><span class="pc">🐻 ×${inc.count}</span></div>`,{maxWidth:220});
    bearMarkers[inc.id]=m;
  });

  setTimeout(()=>leafMap.invalidateSize(),100);
}

function updateSelfOnMap(){
  if(!leafMap||!selfLatLng) return;
  const {lat,lng,acc}=selfLatLng;
  const icon=L.divIcon({className:'',html:'<div class="self-map-marker"></div>',iconSize:[16,16],iconAnchor:[8,8]});
  if(selfMapMark){
    selfMapMark.setLatLng([lat,lng]);
  } else {
    selfMapMark=L.marker([lat,lng],{icon,zIndexOffset:1000}).addTo(leafMap);
    selfMapMark.bindTooltip('現在地',{permanent:false,direction:'top',className:'leaflet-tooltip',opacity:.9});
  }
  if(selfAccCirc){
    selfAccCirc.setLatLng([lat,lng]).setRadius(acc);
  } else {
    selfAccCirc=L.circle([lat,lng],{radius:acc,color:'#00e5ff',fillColor:'#00e5ff',fillOpacity:.06,weight:1,dashArray:'4,4'}).addTo(leafMap);
  }
  // HUD更新
  const la=lat.toFixed(4),ln=lng.toFixed(4);
  document.getElementById('mapHud').innerHTML=`SHIGA PREF.<br>N ${la} E ${ln}<br>BEAR ZONE ACTIVE`;
}

// ログタップ → MAPに移動してポップアップ
function flyToIncident(inc){
  // MAPタブに切替
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));
  document.querySelectorAll('.page').forEach(x=>x.classList.remove('active'));
  document.querySelector('[data-page="pMap"]').classList.add('on');
  document.getElementById('pMap').classList.add('active');

  if(!mapInit){initMap();mapInit=true;}
  setTimeout(()=>{
    leafMap.invalidateSize();
    leafMap.flyTo([inc.lat,inc.lng],13,{animate:true,duration:.8});
    setTimeout(()=>{
      if(bearMarkers[inc.id]) bearMarkers[inc.id].openPopup();
    },900);
  },100);
}

/* ═══════════════════════════════════════
   LOG
═══════════════════════════════════════ */
function renderLog(){
  const el=document.getElementById('logEl');el.innerHTML='';
  INC.forEach(inc=>{
    const e=document.createElement('div');e.className=`le ${inc.age}`;
    e.innerHTML=`
      <div class="lt">${inc.time}</div>
      <div class="lb">
        <div class="lloc">📍 ${inc.location}</div>
        <div class="ldet">${inc.detail}</div>
        <div class="map-hint">▶ タップで地図に移動</div>
      </div>
      <div class="lcnt">🐻 ×${inc.count}</div>`;
    e.addEventListener('click',()=>flyToIncident(inc));
    el.appendChild(e);
  });
  const today=INC.filter(i=>i.age!=='old');
  const bears=INC.reduce((a,i)=>a+i.count,0);
  document.getElementById('stToday').textContent=today.length+'件';
  document.getElementById('stMonth').textContent=INC.length+'件';
  document.getElementById('stBears').textContent=bears+'頭';
}

/* ═══════════════════════════════════════
   STATS / CLOCK
═══════════════════════════════════════ */
function updateStats(){
  const t=INC.filter(i=>i.age!=='old');
  document.getElementById('tc').textContent=t.length+'件';
  const f=INC.find(i=>i.age==='fresh');
  if(f) document.getElementById('ltime').textContent=f.time;
  document.getElementById('mbadge').textContent=INC.length;
}
function tick(){
  const n=new Date();
  document.getElementById('clk').textContent=[n.getHours(),n.getMinutes(),n.getSeconds()].map(x=>String(x).padStart(2,'0')).join(':');
}
setInterval(tick,1000);tick();

window.addEventListener('resize',()=>{resizeCanvas();});
resizeCanvas();renderLog();updateStats();
</script>
